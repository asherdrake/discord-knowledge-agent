services:
  db:
    image: postgres:16
    container_name: discord-knowledge-agent-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: discord_agent
      POSTGRES_PASSWORD: password
      POSTGRES_DB: discord_agent
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
  chromadb:
    image: chromadb/chroma:1.5.3
    container_name: discord-knowledge-agent-chroma
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - chroma_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v2/heartbeat"]
      interval: 30s
      timeout: 10s
      retries: 3
volumes:
  pgdata: